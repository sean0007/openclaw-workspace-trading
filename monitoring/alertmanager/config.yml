global:
  resolve_timeout: 5m

route:
  receiver: 'team-pager'
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h

receivers:
  - name: 'team-pager'
    email_configs:
      - to: 'ops@example.com'
        from: 'alertmanager@example.com'
        smarthost: 'smtp.example.com:587'
        auth_username: 'alertmanager'
        auth_identity: 'alertmanager'
        auth_password: 'REPLACE_ME'
    webhook_configs:
      - url: 'http://localhost:5001/alert'  # placeholder for local testing

templates: []

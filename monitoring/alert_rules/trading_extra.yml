groups:
  - name: trading.extra.rules
    rules:
      - alert: HighAverageLatency
        expr: job:execution_latency_ms:avg > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High average execution latency'
          description: 'Average execution latency over 5m is > 500ms ({{ $value }}).'

      - alert: HighAverageSlippage
        expr: avg_over_time(openclaw_trade_slippage_bps[5m]) > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'High average slippage'
          description: 'Average trade slippage (bps) over 5m exceeds 50 bps.'

      - alert: DLQPerStrategyGrowth
        expr: increase(openclaw_dlq_entries_total[10m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'DLQ growth per label detected'
          description: 'Dead-letter queue entries increased in the last 10m: {{ $value }}. Investigate failing strategies.'

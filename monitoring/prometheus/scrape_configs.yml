scrape_configs:
  - job_name: 'execution_service'
    static_configs:
      - targets: ['127.0.0.1:8000']
        labels:
          service: 'execution_service'
  - job_name: 'signer_service'
    static_configs:
      - targets: ['127.0.0.1:8100']
        labels:
          service: 'signer_service'
  - job_name: 'strategy_runtime'
    static_configs:
      - targets: ['127.0.0.1:8200']
        labels:
          service: 'strategy_runtime'
  - job_name: 'local_node'
    static_configs:
      - targets: ['127.0.0.1:9000']
        labels:
          service: 'local_node'

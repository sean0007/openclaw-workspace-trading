global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'execution_service'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8000']

  - job_name: 'signer_service'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8100']

  - job_name: 'strategy_runtime'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8200']

  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']

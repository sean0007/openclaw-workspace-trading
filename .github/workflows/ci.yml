name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  validate-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Validate openclaw config
        run: |
          python3 scripts/validate_config.py ~/.openclaw/openclaw.json || true

      - name: Run tests
        run: |
          pytest -q
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-validate:
    name: Tests + Grafana validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run pytest (strict mode)
        env:
          SIGNER_API_KEY: local-test-signer
          OPENCLAW_ALLOW_LOCAL_SIGNER: ''
        run: |
          mkdir -p results
          python -m pytest -q --junitxml=results/junit.xml || true

      - name: Validate Grafana dashboards (dry-run)
        env:
          GRAFANA_URL: http://127.0.0.1:3000
        run: |
          python3 scripts/provision_grafana_dashboards.py --dry-run || true

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-ci-artifacts
          path: |
            results/**
            artifacts/smoke_harness_*.txt
            artifacts/dashboard_pack_*.json
            monitoring/grafana/*.json
            artifacts/*.db
            monitoring/grafana/provisioning/*.yml

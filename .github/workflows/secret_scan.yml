name: Secret Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run secret scan
        run: |
          python3 scripts/secret_scan.py
          python3 - <<'PY'
import json
f='artifacts/secret_scan_*.json'
print('CI placeholder: ensure secret_scan artifact created and inspected')
PY

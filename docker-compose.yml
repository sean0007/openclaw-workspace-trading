version: '3.7'
services:
  prometheus:
    image: prom/prometheus:latest
    command: --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus/scrape_configs.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules:/etc/prometheus/rules:ro
    ports:
      - '9090:9090'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=adminMe1977!
    ports:
      - '3000:3000'
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    command: --path.procfs /host/proc --path.sysfs /host/sys --collector.filesystem.ignored-mount-points="^/(sys|proc|dev|host|etc)($|/)"
    network_mode: bridge
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    ports:
      - '9100:9100'
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      # Alertmanager expects its config at /etc/alertmanager/alertmanager.yml
      - ./monitoring/alertmanager/config.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - '9094:9093'
    restart: unless-stopped

  alert-receiver:
    image: python:3.11-slim
    volumes:
      - ./monitoring/alertmanager:/srv:ro
      - ./monitoring/alertmanager/data:/srv/data:rw
    command: ['python', '/srv/receiver.py']
    ports:
      - '5001:5001'
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - '8025:8025' # web UI
      - '1025:1025' # smtp
    restart: unless-stopped
